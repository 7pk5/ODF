name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    name: Lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: flake8 main.py ui/ search_engine/ utils/ --max-line-length=120 --exclude=odf_env,build,dist --extend-ignore=E221,E272,E302,E305,W293,F401,F821,F841

  install:
    name: Dependency Install
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "import chromadb; print('chromadb ok')"
          python -c "import fastembed; print('fastembed ok')"
          python -c "import customtkinter; print('customtkinter ok')"
          python -c "import pdfminer; print('pdfminer ok')"
          python -c "import docx; print('python-docx ok')"
